  stop_watch_timer: 3.0.2
  table_calendar: 3.0.9
  timeago: 3.2.2
  url_launcher: 6.2.5
  url_launcher_android: 6.3.0
  image_picker: ^0.8.7+3
  flutter_local_notifications: ^14.0.0
  http: ^0.13.4
  flutter_social_button: 1.1.4+1
  url_launcher_ios: 6.2.5
  convex_bottom_bar: ^3.0.0
  salomon_bottom_bar: ^3.3.1  # Add the latest version here
  url_launcher_platform_interface: 2.3.2
  uuid: ^4.0.0
  webview_flutter: ^4.0.0
  webview_flutter_android: 3.15.0
  webview_flutter_platform_interface: 2.10.0
  webview_flutter_wkwebview: 3.12.0
  webviewx_plus: 0.5.0
  youtube_player_flutter: ^8.0.0
  youtube_player_iframe:
    git:
      url: https://github.com/FlutterFlow/youtube_player_flutter.git
      path: packages/youtube_player_iframe


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.0

dependency_overrides:
  http: 1.2.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_lints: 3.0.0
  lints: 3.0.0
  build_runner: ^2.3.3
  retrofit_generator: ^8.2.1
  json_serializable: ^6.5.0


